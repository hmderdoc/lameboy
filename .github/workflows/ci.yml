name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Default (door) build is pure-Rust and dependency-free.
      - name: build (default / door)
        run: cargo build --release --locked
      - name: test
        run: cargo test --release --locked
      # The optional local-audio path links ALSA; make sure it still compiles.
      - name: build (localaudio)
        run: |
          sudo apt-get update && sudo apt-get install -y libasound2-dev
          cargo build --release --locked --features localaudio
